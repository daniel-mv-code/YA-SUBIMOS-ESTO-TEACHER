<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión Mecánica - Contacto</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <nav id="barra_busqueda">
        <a href="index.html">Inicio</a>
        <a href="nosotros.html">Quiénes Somos</a>
        <a href="login.html">Login</a>
        <a href="registro.html">Registro</a>
        <a href="contacto.html" style="background-color: #444; font-weight: bold;">Contacto</a>
        <a href="panel.html">Panel</a>
    </nav>

    <header id="seccion_h1">
        <h1>Contáctanos</h1>
        <p>¿Tienes dudas o necesitas soporte técnico técnico? Escríbenos.</p>
    </header>

    <main class="contenedor-cajas">
        <div class="carta_informacion caja-border" style="width: 100%; max-width: 500px;">
            <form style="display: flex; flex-direction: column; width: 100%;">
                <h2>Enviar Mensaje</h2>
                <br>
                <label style="margin-bottom: 5px; color: #333; font-weight: bold;">Asunto:</label>
                <input type="text" class="input-formulario" placeholder="Soporte Técnico / Consulta Comercial" required>
                
                <label style="margin-bottom: 5px; color: #333; font-weight: bold;">Correo de Contacto:</label>
                <input type="email" class="input-formulario" placeholder="tu@correo.com" required>
                
                <label style="margin-bottom: 5px; color: #333; font-weight: bold;">Mensaje:</label>
                <textarea class="input-formulario" rows="5" placeholder="Escribe detalladamente tu solicitud aquí..." style="resize: none; font-family: Arial, sans-serif;"></textarea>
                
                <br>
                <button type="submit" class="btn-accion" style="border: none; width: 100%;">Enviar Solicitud</button>
            </form>
            <span class="etiqueta">Soporte</span>
        </div>
    </main>

    <footer id="principal_papi">
        <p>© 2026 Sistema de Gestión Mecánica - Proyecto Formativo SENA</p>
    </footer>

</body>
</html>
