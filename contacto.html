<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDAI - Contacto</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <nav id="barra_busqueda">
        <a href="index.html">Inicio</a>
        <a href="nosotros.html">Quiénes Somos</a>
        <a href="login.html">Login</a>
        <a href="registro.html">Registro</a>
        <a href="contacto.html" class="active">Contacto</a>
        <a href="panel.html">Panel Admin</a>

    <header id="seccion_h1">
        <h1>Mesa de Control y Soporte</h1>
        <p>¿Requiere asistencia técnica con la integración del escáner vehicular? Contáctenos.</p>
    </header>

    <main class="contenedor-cajas">
        <div class="carta_informacion caja-border" style="width: 100%; max-width: 500px;">
            <form style="display: flex; flex-direction: column; width: 100%;">
                <h2>Radicar Ticket</h2>
                <br>
                <label>Asunto Institucional:</label>
                <input type="text" class="input-formulario" placeholder="Falla de Conexión OBD / Error de Token API" required>
                
                <label>Correo Electrónico:</label>
                <input type="email" class="input-formulario" placeholder="ingeniero@taller.com" required>
                
                <label>Descripción del Evento:</label>
                <textarea class="input-formulario" rows="4" placeholder="Indique los códigos de error devueltos por el sistema..." style="resize: none; font-family: inherit;"></textarea>
                
                <button type="submit" class="btn-accion" style="border: none; width: 100%;">Abrir Caso</button>
            </form>
            <span class="etiqueta">SDAI-Help</span>
        </div>
    </main>

    <a href="https://wa.me/573000000000" class="btn-soporte-fixed" target="_blank">💬 WhatsApp SDAI</a>

    <footer id="principal_papi">
        <p>© 2026 SDAI - Sistema de Diagnóstico Automotriz Inteligente - SENA ADSO</p>
    </footer>

</body>
